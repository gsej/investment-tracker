<div class="h-full outline-1 flex flex-col relative">
  <div class="flex-grow">
    <canvas  id="MyChart">{{ chart }}</canvas>
  </div>

  @if (activeComment) {
    <div class="absolute top-2 right-2 z-10 w-80 rounded-lg border border-gray-300 bg-white shadow-lg p-4">
      <div class="flex items-start justify-between mb-2">
        <div class="text-sm font-semibold text-gray-900">{{ activeComment.date }}</div>
        <button
          type="button"
          class="text-gray-400 hover:text-gray-700 leading-none text-lg font-bold ml-2"
          aria-label="Close"
          (click)="closeComment()">&times;</button>
      </div>
      <div class="text-xs text-gray-600 mb-2">
        {{ activeComment.accountCodes.join(', ') }}
      </div>
      <div class="text-sm text-gray-800 whitespace-pre-wrap">{{ activeComment.text }}</div>
      @if (visibleComments.length > 1) {
        <div class="flex items-center justify-between mt-3 pt-2 border-t border-gray-200">
          <button
            type="button"
            class="text-gray-500 hover:text-gray-900 disabled:opacity-30 disabled:cursor-not-allowed text-xl px-1 leading-none"
            [disabled]="!hasPreviousComment"
            (click)="previousComment()"
            aria-label="Previous comment">&#8249;</button>
          <span class="text-xs text-gray-500">{{ activeCommentIndex! + 1 }} / {{ visibleComments.length }}</span>
          <button
            type="button"
            class="text-gray-500 hover:text-gray-900 disabled:opacity-30 disabled:cursor-not-allowed text-xl px-1 leading-none"
            [disabled]="!hasNextComment"
            (click)="nextComment()"
            aria-label="Next comment">&#8250;</button>
        </div>
      }
    </div>
  }

  <div>
    <form #form="ngForm">
      <div class="mx-10 grid grid-cols-3 gap-10 rounded-xl ">
        <div>
          <input type="radio" name="chart-type" id="valueInGbp" value="valueInGbp" class="peer hidden" checked [(ngModel)]="chartType" (ngModelChange)="onChartTypeChange($event)" />
          <label for="valueInGbp" class="text-sm, font-medium, block cursor-pointer select-none rounded-xl p-2 text-center bg-gray-200 text-black peer-checked:bg-gray-500 peer-checked:font-bold peer-checked:text-white">Value In Gbp</label>
        </div>
        <div>
          <input type="radio" name="chart-type" id="unitValue" value="unitValue" class="peer hidden" [(ngModel)]="chartType" (ngModelChange)="onChartTypeChange($event)" />
          <label for="unitValue" class="text-sm, font-medium, block cursor-pointer select-none rounded-xl p-2 text-center bg-gray-200 text-black peer-checked:bg-gray-500 peer-checked:font-bold peer-checked:text-white">Unit Value</label>
        </div>
        <div>
          <input type="radio" name="chart-type" id="numberOfUnits" value="numberOfUnits" class="peer hidden" [(ngModel)]="chartType" (ngModelChange)="onChartTypeChange($event)" />
          <label for="numberOfUnits" class="text-sm, font-medium, block cursor-pointer select-none rounded-xl p-2 text-center bg-gray-200 text-black peer-checked:bg-gray-500 peer-checked:font-bold peer-checked:text-white">Number Of Units</label>
        </div>
      </div>
    </form>
  </div>
</div>
